<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus DeFi - Token Prices & Swaps</title>
    <meta name="description" content="A premium, lightning-fast DeFi token swap interface to purchase and exchange BUSD and WBNB on Binance Smart Chain.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-layout">
        <header class="app-header">
            <div class="brand">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
                        <circle cx="16" cy="16" r="14" fill="url(#brandGrad)" />
                        <path d="M16 8L22 14L16 20L10 14L16 8Z" fill="#111" />
                        <path d="M16 12L19 15L16 18L13 15L16 12Z" fill="#F3BA2F" />
                        <defs>
                            <linearGradient id="brandGrad" x1="0" y1="0" x2="32" y2="32">
                                <stop offset="0%" stop-color="#F3BA2F" />
                                <stop offset="100%" stop-color="#00E5FF" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <span class="brand-text">Nexus <span class="accent-text">DeFi</span></span>
            </div>

            <div class="header-actions">
                <div id="networkBadge" class="network-badge hidden">
                    <span class="dot"></span>
                    <span class="network-name">BSC Mainnet</span>
                </div>
                <button id="connectBtn" class="connect-btn">Connect Wallet</button>
            </div>
        </header>

        <main class="main-content">
            <section class="swap-card-container">
                <div class="swap-card">
                    <div class="card-header">
                        <h2 class="card-title">Swap</h2>
                    </div>

                    <div class="swap-inputs">
                        <div class="input-block" id="fromBlock">
                            <div class="block-header">
                                <span class="block-label">You Pay</span>
                                <span class="token-balance" id="fromBalance">Balance: 0.00</span>
                            </div>
                            <div class="input-row">
                                <input type="number" id="fromAmount" class="token-input" placeholder="0.0" min="0" step="any" autocomplete="off" inputmode="decimal">
                                <div class="token-select" id="fromSelectBtn">
                                    <div class="token-icon" id="fromIcon"></div>
                                    <span class="token-symbol" id="fromSymbol">BUSD</span>
                                </div>
                            </div>
                            <div class="input-footer">
                                <span class="usd-value" id="fromUsdValue">~$0.00</span>
                                <button class="max-btn" id="maxBtn">MAX</button>
                            </div>
                        </div>

                        <div class="switch-container">
                            <button class="switch-btn" id="switchBtn" aria-label="Switch Tokens">
                                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                </svg>
                            </button>
                        </div>

                        <div class="input-block" id="toBlock">
                            <div class="block-header">
                                <span class="block-label">You Receive</span>
                                <span class="token-balance" id="toBalance">Balance: 0.00</span>
                            </div>
                            <div class="input-row">
                                <input type="text" id="toAmount" class="token-input" placeholder="0.0" readonly>
                                <div class="token-select" id="toSelectBtn">
                                    <div class="token-icon" id="toIcon"></div>
                                    <span class="token-symbol" id="toSymbol">WBNB</span>
                                </div>
                            </div>
                            <div class="input-footer">
                                <span class="usd-value" id="toUsdValue">~$0.00</span>
                                <span class="loading-indicator hidden" id="priceLoader">
                                    <span class="spinner-mini"></span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="price-info-panel hidden" id="priceInfoPanel">
                        <div class="info-row">
                            <span class="info-label">Price</span>
                            <span class="info-value" id="exchangeRate">1 BUSD = -- WBNB</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Minimum Received</span>
                            <span class="info-value" id="minReceived">-- WBNB</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Slippage Tolerance</span>
                            <span class="info-value">0.5%</span>
                        </div>
                    </div>

                    <div class="network-alert hidden" id="networkAlert">
                        <div class="alert-content">
                            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="alert-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span>Please switch to Binance Smart Chain to trade.</span>
                        </div>
                        <button id="switchNetworkBtn" class="alert-action-btn">Switch Network</button>
                    </div>

                    <button id="actionBtn" class="action-btn">Connect Wallet</button>
                </div>
            </section>
        </main>

        <div id="toastContainer" class="toast-container"></div>


    </div>
</body>
</html>
